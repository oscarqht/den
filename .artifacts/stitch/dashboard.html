<style>
        .perspective-container {
            perspective: 2000px;}
        .card-wrapper {
            position: relative;
            z-index: 10;
            perspective: 1200px;transform-style: preserve-3d;overflow: visible !important; 
        }
        .hit-area {
            position: absolute;
            inset: -40px;
            z-index: 50;
            cursor: pointer;transform: translateZ(100px); 
        }
        .tilt-card {
            transform-style: preserve-3d;
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease;
            will-change: transform;
            position: relative;box-shadow: 
                0 30px 60px -10px rgba(0, 0, 0, 0.2),
                0 0 20px rgba(255, 255, 255, 0.2);
            height: 100%;border-radius: 1.25rem;border: 1px solid rgba(255, 255, 255, 0.4); 
            transform: rotateX(0deg) rotateY(0deg);
        }.tilt-card::after {
            content: "";
            position: absolute;
            inset: -2px;border-radius: 1.25rem;
            background: linear-gradient(
                115deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.0) 30%, 
                rgba(255, 255, 255, 0.6) 45%, 
                rgba(255, 255, 255, 0.9) 50%, 
                rgba(255, 255, 255, 0.6) 55%, 
                rgba(255, 255, 255, 0.0) 70%, 
                transparent 100%
            );
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 30;
            mix-blend-mode: overlay;background-size: 250% 250%; 
            background-position: var(--bg-pos-x, 50%) var(--bg-pos-y, 50%);filter: blur(3px); 
        }.tilt-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 1.25rem;
            background: radial-gradient(
                1000px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                rgba(255, 255, 255, 0.7) 0%, 
                rgba(255, 255, 255, 0.2) 25%, 
                transparent 60%
            );
            opacity: 0;
            z-index: 25;
            pointer-events: none;
            mix-blend-mode: soft-light;
            transition: opacity 0.3s ease;
        }
        .card-wrapper:hover .tilt-card::after,
        .card-wrapper:hover .tilt-card::before {
            opacity: 1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);box-shadow: 
                inset 0 0 40px rgba(255, 255, 255, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 1);
        }.bg-gradient-mesh-1 { background: radial-gradient(at top left, #dce4ff, transparent 80%), radial-gradient(at bottom right, #c7d2fe, transparent 80%), #f8fafc; }
        .bg-gradient-mesh-2 { background: radial-gradient(at top right, #dcfce7, transparent 80%), radial-gradient(at bottom left, #bbf7d0, transparent 80%), #f8fafc; }
        .bg-gradient-mesh-3 { background: radial-gradient(at top center, #fae8ff, transparent 80%), radial-gradient(at bottom center, #f5d0fe, transparent 80%), #f8fafc; }
        .bg-gradient-mesh-4 { background: radial-gradient(at center, #ffedd5, transparent 80%), radial-gradient(at bottom right, #fed7aa, transparent 80%), #f8fafc; }
        .card-content {
            transform: translateZ(50px);
            transition: transform 0.1s;
        }
        .card-icon-depth {
            transform: translateZ(30px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
    </style>

<script>
    function handleMouseMove(e) {
        const wrapper = e.currentTarget;
        const card = wrapper.querySelector('.tilt-card');
        const rect = wrapper.getBoundingClientRect();
        // Calculate position
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        // Calculate rotation (Increased range for better 3D feel)
        const rotateX = ((y - centerY) / centerY) * -12; // Inverted for natural tilt
        const rotateY = ((x - centerX) / centerX) * 12;
        // Calculate sheen gradient movement
        // We move the gradient background position to simulate light sweeping across
        const bgPosX = 50 + (((x - centerX) / centerX) * 40);
        const bgPosY = 50 + (((y - centerY) / centerY) * 40);
        // Update properties
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
        card.style.setProperty('--bg-pos-x', `${bgPosX}%`);
        card.style.setProperty('--bg-pos-y', `${bgPosY}%`);
        // Apply transform
        // scale3d prevents edge anti-aliasing artifacts during rotation
        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
    }
    function handleMouseLeave(e) {
        const wrapper = e.currentTarget;
        const card = wrapper.querySelector('.tilt-card');
        // Reset transform smoothly
        card.style.transform = 'rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)';
        // Optional: Animate opacity out or reset position if needed
        // Keeping last position can sometimes feel nicer, but resetting is cleaner
    }
</script>
