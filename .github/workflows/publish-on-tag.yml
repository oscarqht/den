name: Publish To NPM

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve-tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ -z "${TAG_NAME}" ]; then
            echo "No release tag found for this event. Skipping publish."
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"
          echo "should_publish=true" >> "${GITHUB_OUTPUT}"

      - name: Verify tag points to main history
        id: verify-main
        if: steps.resolve-tag.outputs.should_publish == 'true'
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "${{ steps.resolve-tag.outputs.tag_name }}")"

          if git merge-base --is-ancestor "${TAG_COMMIT}" origin/main; then
            echo "on_main=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "on_main=false" >> "${GITHUB_OUTPUT}"
          echo "Tag ${{ steps.resolve-tag.outputs.tag_name }} is not on main. Skipping publish."

      - name: Set up Node.js
        if: steps.resolve-tag.outputs.should_publish == 'true' && steps.verify-main.outputs.on_main == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        if: steps.resolve-tag.outputs.should_publish == 'true' && steps.verify-main.outputs.on_main == 'true'
        run: npm ci

      - name: Publish package
        if: steps.resolve-tag.outputs.should_publish == 'true' && steps.verify-main.outputs.on_main == 'true'
        run: npm publish --access public --provenance
